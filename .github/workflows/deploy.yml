name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Production deploy (push to main) — trusted code, no sandbox needed.
  deploy-production:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          WEBSITE_CANARY: ${{ secrets.WEBSITE_CANARY }}
        run: scripts/publish

  # Preview deploy (pull requests) — untrusted code, sandboxed.
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
      DEPLOY_BRANCH: ${{ github.head_ref }}
      GITHUB_EVENT_NAME: pull_request
      PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WEBSITE_CANARY: ${{ secrets.WEBSITE_CANARY }}
    steps:
      - uses: airutorg/sandbox-action@v0
        with:
          command: scripts/publish
          pr_sha: ${{ github.event.pull_request.head.sha }}
